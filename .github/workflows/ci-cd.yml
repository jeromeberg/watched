name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        project: [frontend, backend]
    defaults:
      run:
        working-directory: ${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ${{ matrix.project }}/package-lock.json

      - run: npm ci

      - name: Generate Prisma client (backend)
        if: matrix.project == 'backend'
        run: npx prisma generate

      - run: npm run lint

      - name: Typecheck (backend)
        if: matrix.project == 'backend'
        run: npx tsc --noEmit

      - run: npm test --if-present

      - run: npm run build

  build-and-push:
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile.prod
            image: ghcr.io/jeromeberg/watched-frontend
            buildArgs: VITE_API_URL=${{ vars.PROD_API_URL }}
          - name: backend
            context: ./backend
            dockerfile: ./backend/Dockerfile.prod
            image: ghcr.io/jeromeberg/watched-backend
            buildArgs: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/arm64
          push: true
          build-args: ${{ matrix.buildArgs }}
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
      DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
    steps:
      - name: Trigger deploy webhook
        if: env.DEPLOY_WEBHOOK_URL != '' && env.WEBHOOK_SECRET != ''
        run: |
          set -euo pipefail
          PAYLOAD=$(printf '{"ref":"%s","sha":"%s"}' "$GITHUB_REF" "$GITHUB_SHA")
          SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" -r | cut -d' ' -f1)
          curl -sf --max-time 30 -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            --data "$PAYLOAD"
